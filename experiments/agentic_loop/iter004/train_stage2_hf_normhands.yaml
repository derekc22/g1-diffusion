root_dir: "./data/hf_bps_preprocessed"

train:
  batch_size: 128
  num_epochs: 10000
  lr: 2e-5
  timesteps: 1000
  device: "cuda:0"
  architecture: "transformer"
  save_dir: "./logs"
  save_every: 1
  init_ckpt_path: "/home/learning/Documents/g1-diffusion/logs/stage2_hf_e10000_b128_lr0.0001_ts1000_w120_s10_transformer_2026May04_19-48-49/checkpoints/stage2_hf_epoch_000499.pt"
  resume_optimizer: false
  max_train_seconds: 1200

dataset:
  window_size: 120
  stride: 10
  min_seq_len: 30
  train_split: 0.99
  preload: true
  normalize_hands: true

model:
  mlp_hidden: 512
  mlp_layers: 4
  d_model: 512
  nhead: 8
  num_layers: 8
  dim_feedforward: 512
  dropout: 0.1

loss:
  base_weight: 1.0
  velocity_weight: 0.2
  acceleration_weight: 0.1
  smooth_acceleration_weight: 0.02
  smooth_jerk_weight: 0.005
