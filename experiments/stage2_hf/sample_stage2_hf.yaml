# Stage 2 HF End-to-End Pipeline Configuration
# Object Motion Features → Hand Positions → Full Body Motion
#
# Place experiment configs in experiments/stage2_hf/ and run via:
#   ./src/sample_stage2_hf.sh

root_dir: "./data/hf_preprocessed"

sample:
  # Checkpoints
  stage1_ckpt_path: "logs/stage1_hf_e10000_b128_lr0.0001_ts1000_w120_s10_transformer_2026Apr01_00-26-59/checkpoints/stage1_hf_epoch_000199.pt"
  stage2_ckpt_path: "logs/stage2_hf_e10000_b128_lr0.0001_ts1000_w120_s10_transformer_2026Apr01_00-40-53/checkpoints/stage2_hf_epoch_000199.pt"

  device: "cuda"
  num_samples: 10  # null = process all files
  timesteps: 1000
  seed: 42

  # Contact constraints (applied between Stage 1 and Stage 2)
  apply_constraints: true
  contact_threshold: 0.03

  # Partial motion generation (optional)
  partial_motion_length: 120

dataset:
  window_size: 120
  stride: 10
  min_seq_len: 32
  train: false
  train_split: 0.9
  preload: false
