# Stage 2 FM Optimized — Ultra-Fast Preset (matches DDIM-2 test conditions)
# Object Geometry → Hand Positions → Full Body Motion (Flow Matching)
#
# Euler with 2 steps = 2 NFE per stage, same as DDIM-2.
# FM paths are near-linear so even 2 steps should produce usable results.
# 60-frame partial motion to match the DDIM-2 benchmark.

root_dir: "/media/learning/DATA/export_smplx_retargeted_sub1_clothesstand"

sample:
  stage1_ckpt_path: "logs/stage1_fm_e500_b128_lr0.0001_w120_s10_transformer_2026Mar29_20-36-16/checkpoints/stage1_fm_epoch_000499.pt"
  stage2_ckpt_path: "logs/stage2_fm_e10000_b128_lr0.0001_w120_s10_transformer_2026Mar29_20-52-56/checkpoints/stage2_fm_epoch_000999.pt"
  device: "cuda"
  seed: 42
  num_samples: 10

  # Flow matching inference — 2 Euler steps = 2 NFE, same budget as DDIM-2
  num_inference_steps: 20
  ode_solver: "euler"

  # Contact constraints
  apply_constraints: true
  contact_threshold: 0.03

  # 60-frame partial motion to match DDIM-2 benchmark
  partial_motion_length: 60

optimization:
  precision: "fp16"
  use_torch_compile: true
  compile_mode: "reduce-overhead"
  warmup_iterations: 10

exp_name: "fm_optimized_ultrafast_20step"
