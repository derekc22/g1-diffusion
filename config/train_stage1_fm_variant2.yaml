# Stage 1 Flow Matching Training Configuration - variant2
# Linear interpolation between initial/final object frames

root_dir: "/media/learning/DATA/export_smplx_retargeted_sub1_clothesstand"

train:
  batch_size: 128
  num_epochs: 1000
  lr: 1e-4
  device: "cuda:0"
  architecture: "transformer"
  save_dir: "./logs"
  save_every: 100
  generative_model: "flow_matching"
  sigma_min: 1e-4
  num_inference_steps: 50
  ode_solver: "euler"
  timestep_sampling: "uniform"
  logit_normal_mean: 0.0
  logit_normal_std: 1.0

dataset:
  window_size: 120
  stride: 10
  min_seq_len: 30
  train_split: 0.9
  preload: true
  object_conditioning_variant: "variant2"

model:
  encoder_hidden: 512
  encoder_layers: 3
  object_feature_dim: 256
  denoiser_hidden: 512
  denoiser_layers: 4
  d_model: 256
  nhead: 4
  num_layers: 4
  dim_feedforward: 512
  dropout: 0.1
