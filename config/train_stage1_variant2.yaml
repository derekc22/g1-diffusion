# Stage 1 Training Configuration - variant2
# Linear interpolation between initial/final object frames

root_dir: "/media/learning/DATA/export_smplx_retargeted_sub1_clothesstand"

train:
  batch_size: 128
  num_epochs: 500
  lr: 1e-4
  timesteps: 1000
  device: "cuda:0"
  architecture: "mlp"
  save_dir: "./logs"
  save_every: 25

dataset:
  window_size: 120
  stride: 10
  min_seq_len: 30
  train_split: 0.9
  preload: true
  object_conditioning_variant: "variant2"

model:
  encoder_hidden: 512
  encoder_layers: 3
  object_feature_dim: 256
  denoiser_hidden: 512
  denoiser_layers: 4
  d_model: 256
  nhead: 4
  num_layers: 4
  dim_feedforward: 512
  dropout: 0.1

loss:
  base_weight: 1.0
  velocity_weight: 0.5
  acceleration_weight: 0.25
  smooth_acceleration_weight: 0.05
  smooth_jerk_weight: 0.01
  contact_weight: 20.0
  contact_offset_weight: 1.0
  contact_distance_weight: 5.0
  contact_margin: 0.025
