# Tiny CPU smoke config for object-goal Stage 1.

root_dir: "./data/hf_bps_preprocessed"

train:
  batch_size: 2
  num_epochs: 1
  lr: 1e-4
  timesteps: 8
  beta_start: 1e-4
  beta_end: 0.02
  device: "cpu"
  architecture: "transformer"
  save_dir: "./logs"
  save_every: 1
  exp_prefix: "object_goal_stage1_hf_bps_smoke"
  num_workers: 0
  log_every: 1
  max_grad_norm: 1.0
  max_train_seconds: 20
  init_ckpt_path: null

dataset:
  window_size: 300
  stride: 300
  min_seq_len: 30
  train_split: 0.99
  preload: true
  object_conditioning_variant: "variant0"
  balance_by_object: false

model:
  max_len: 300
  encoder_hidden: 64
  encoder_layers: 2
  object_feature_dim: 64
  global_cond_hidden: 64
  denoiser_hidden: 64
  denoiser_layers: 2
  d_model: 64
  nhead: 4
  num_layers: 1
  dim_feedforward: 128
  dropout: 0.0

loss:
  base_weight: 1.0
  velocity_weight: 0.01
  acceleration_weight: 0.0
  smooth_acceleration_weight: 0.0
  smooth_jerk_weight: 0.0
  contact_weight: 0.0
  contact_offset_weight: 0.0
  contact_distance_weight: 0.0
  contact_margin: 0.025
