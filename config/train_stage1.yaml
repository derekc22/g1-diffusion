# Stage 1 Training Configuration
# Object Geometry → Hand Positions

root_dir: "/media/learning/DATA/export_smplx_retargeted_sub1_clothesstand"

train:
  batch_size: 128
  num_epochs: 500
  lr: 1e-4
  timesteps: 1000  # Diffusion timesteps
  device: "cuda:0"
  architecture: "transformer"  # or "mlp"
  save_dir: "./logs"
  save_every: 25  # Save checkpoint every N epochs

dataset:
  window_size: 120  # Frames per window (4 seconds at 30fps)
  stride: 10        # Window stride
  min_seq_len: 30   # Minimum sequence length
  train_split: 0.9  # Train/validation split
  preload: true    # Load data lazily to avoid OOM with large datasets
  # variant0: exact object trajectory
  # variant1: initial/final object frames only
  # variant2: linear interpolation between initial/final object frames
  object_conditioning_variant: "variant0"

model:
  # Object Geometry Encoder (MLP)
  encoder_hidden: 512
  encoder_layers: 3
  object_feature_dim: 256  # Output dimension of geometry encoder (O_t in paper)

  # MLP denoiser (used when train.architecture: "mlp")
  denoiser_hidden: 512
  denoiser_layers: 4
  
  # Transformer denoiser
  d_model: 256
  nhead: 4
  num_layers: 4  # Paper uses 4 self-attention blocks
  dim_feedforward: 512
  dropout: 0.1

loss:
  base_weight: 1.0
  velocity_weight: 0.5
  acceleration_weight: 0.25
  smooth_acceleration_weight: 0.05
  smooth_jerk_weight: 0.01
  contact_weight: 20.0
  contact_offset_weight: 1.0
  contact_distance_weight: 5.0
  contact_margin: 0.025
